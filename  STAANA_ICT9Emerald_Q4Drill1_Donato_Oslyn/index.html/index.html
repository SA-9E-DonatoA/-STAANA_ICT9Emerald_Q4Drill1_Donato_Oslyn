<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <title>Q4 Drill 1</title>

    <style>
         #kWh, h3{
            font-family: 'Courier New', Courier, monospace;
            font-weight: bold;
         }
         body{
            background: linear-gradient(to bottom right, rgba(192, 192, 192, 0.301), rgb(181, 181, 141));
         }
        
    </style>
    
</head>
<body>
    
    
        
        <div class="container w-75 rounded-5 d-flex justify-content-center align-items-center vh-100">

            <div>
            <h3>Electricity Consumption Classifier</h3>
            </div>

            <div class="bg-dark text-light rounded-5 d-flex justify-content-center align-items-center p-3">
            
            
            <img src="electric_logo.png" style="height: 80px; width: 130px;">
            <br>
            <h1 id="kWh" class="m-2">kWh</h1>

            <input type="text" class="form-control" id="consumption" placeholder="Input kilowatt per hour ?">
        
        
        

        <button type="button" class="btn btn-warning m-2" onclick="check_class()" >Consumption Classification</button>

        <br><br><p><span id="message1" style="color: red; " class="fst-italic"></span></p>
        
            </div>
        </div>
   

    <script>
        function check_class(){
        
            var checker = document.getElementById("consumption").value;
            var A = "Lifeline Consumer"; //0-100kWh
            var B = "Low Consumption"; //101-200kWh
            var C = "Average Consumption"; //201-300kWh
            var D = "High Consumption"; //301-500kWh
            var E = "Very High Consumption"; //above 500kWh

            // Check for invalid input (negative or non-numeric)
            if (isNaN(checker) || checker < 0) {
                document.getElementById("message1").innerHTML = "Please input a valid number.";
                
            }
        
            else if (checker <= 100) {
                alert(A + " : Discounted electricity rates to help low-income households.");
                window.location.reload();
            }
            
            else if (checker <= 200) {
                alert(B + " : Normal residential rate.");
                window.location.reload();
            }
        
            else if (checker <= 300) {
                alert(C + " : Typical electricity usage.");
                window.location.reload();
            }
            
            else if (checker <= 500) {
                alert(D + " : Higher electricity usage.");
                window.location.reload();
            }
        
            else {
                alert(E + " : Heavy electricity users. ");
                window.location.reload();
            }
        }
    </script>
    
</body>
</html>
