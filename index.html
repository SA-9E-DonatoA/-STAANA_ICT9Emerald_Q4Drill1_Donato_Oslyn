<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Electricity Consumption Classifier</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: linear-gradient(135deg, #cfe9ff, #ffd6e7);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', sans-serif;
        }

        /* Glass Card */
        .card-custom {
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            background: rgba(255, 255, 255, 0.25);
            border-radius: 25px;
            padding: 35px;
            width: 370px;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.4);
            box-shadow: 
                0 8px 25px rgba(0, 0, 0, 0.15),
                0 0 20px rgba(173, 216, 230, 0.6),
                0 0 40px rgba(255, 182, 193, 0.4);
        }

        h3 {
            font-weight: bold;
            color: #5fa8d3;
            margin-bottom: 15px;
        }

        #kWh {
            font-family: 'Courier New', monospace;
            font-weight: bold;
            color: #5fa8d3;
        }

        /* Light bulb glow */
        .bulb-img {
            height: 90px;
            width: 120px;
            margin-bottom: 10px;
            filter: drop-shadow(0 0 8px rgba(255, 255, 200, 0.8))
                    drop-shadow(0 0 15px rgba(255, 182, 193, 0.5));
        }

        input {
            border-radius: 12px !important;
            border: none;
            padding: 10px;
            background: rgba(255,255,255,0.6);
        }

        input:focus {
            outline: none;
            box-shadow: 0 0 8px rgba(173,216,230,0.8);
        }

        .btn-custom {
            background: rgba(255,255,255,0.6);
            border: none;
            border-radius: 12px;
            font-weight: 500;
            transition: 0.3s;
        }

        .btn-custom:hover {
            background: rgba(255,255,255,0.9);
            box-shadow: 0 0 10px rgba(173,216,230,0.7);
        }

        #message1 {
            color: #ff8fab;
        }
    </style>
</head>

<body>

<div class="card-custom">

    <h3>⚡ Electricity Consumption</h3>

    <!-- YOUR IMAGE -->
    <img src="light bulb.png" class="bulb-img">

    <h2 id="kWh">kWh</h2>

    <input type="text" class="form-control my-3" id="consumption" placeholder="Enter kWh">

    <button class="btn btn-custom w-100" onclick="check_class()">Check Classification</button>

    <p class="mt-3">
        <span id="message1" class="fst-italic"></span>
    </p>

</div>

<script>
function check_class(){

    var checker = document.getElementById("consumption").value;
    var A = "Lifeline Consumer";
    var B = "Low Consumption";
    var C = "Average Consumption";
    var D = "High Consumption";
    var E = "Very High Consumption";

    if (isNaN(checker) || checker < 0) {
        document.getElementById("message1").innerHTML = "Please input a valid number.";
    }

    else if (checker <= 100) {
        alert(A + " : Discounted electricity rates.");
        window.location.reload();
    }

    else if (checker <= 200) {
        alert(B + " : Normal residential rate.");
        window.location.reload();
    }

    else if (checker <= 300) {
        alert(C + " : Typical electricity usage.");
        window.location.reload();
    }

    else if (checker <= 500) {
        alert(D + " : Higher electricity usage.");
        window.location.reload();
    }

    else {
        alert(E + " : Heavy electricity users.");
        window.location.reload();
    }
}
</script>

</body>
</html>
